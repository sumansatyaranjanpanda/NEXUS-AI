services:
  nexus-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - fastembed_cache:/root/.cache/fastembed
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build: .
    # -P solo: single-thread pool, avoids multiprocessing/asyncio conflicts in dev.
    # For production use -P gevent or -P prefork with --concurrency=4
    command: celery -A nexus.workers.tasks worker --loglevel=info -P solo
    env_file:
      - .env
    volumes:
      - fastembed_cache:/root/.cache/fastembed
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    # redis-stack includes RediSearch module required by langgraph-checkpoint-redis.
    # It also exposes RedisInsight UI at http://localhost:8001 for debugging.
    # To downgrade to plain redis:7-alpine, remove langgraph-checkpoint-redis from pyproject.toml
    # and accept that Celery async mode won't have shared graph state.
    image: redis/redis-stack:7.4.0-v3
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI — open in browser to inspect keys
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qdrant_data:
  redis_data:
  fastembed_cache:
